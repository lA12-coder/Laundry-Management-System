# Render Blueprint — deploy API + static frontend + managed Postgres.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: fualaundry-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    healthCheckPath: /api/health/
    envVars:
      - key: DEBUG
        value: "False"
      - key: SERVE_MEDIA
        value: "True"
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: ALLOWED_HOSTS
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DB_ENGINE
        value: django.db.backends.postgresql
      - key: DB_NAME
        fromDatabase:
          name: fualaundry-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: fualaundry-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: fualaundry-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: fualaundry-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: fualaundry-db
          property: port
      - key: FRONT_END_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.smtp.EmailBackend
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: CONTACT_FORM_RECIPIENT
        value: fualaundry16@gmail.com
      - key: REDIS_URL
        sync: false

  - type: web
    name: fualaundry-frontend
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./frontend/dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_GOOGLE_MAPS_API_KEY
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: fualaundry-db
    plan: starter
    databaseName: fualaundry
    user: fualaundry
