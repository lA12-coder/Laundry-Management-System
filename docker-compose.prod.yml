# Production overrides — gunicorn, no bind mounts, hardened defaults.
services:
  api:
    environment:
      DEBUG: "False"
      SERVE_MEDIA: "True"
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-False}
    volumes:
      - media_data:/app/media

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
    ports:
      - "${FRONTEND_PUBLISH_PORT:-80}:80"

  db:
    ports: []

  redis:
    ports: []
